# fly.toml app configuration file generated for turniq-backend on 2026-04-25T02:34:50+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'turniq-backend'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python manage.py migrate --noinput"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
